apiVersion: apps/v1
kind: Deployment
metadata:
  name: registration-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: registration-service
  template:
    metadata:
      labels:
        app: registration-service
    spec:
      containers:
      - name: registration-service
        image: registration-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@registration-db:5432/registrationdb"
        - name: EVENT_SERVICE_URL
          value: "http://event-service:8000"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: registration-service
spec:
  selector:
    app: registration-service
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30003
